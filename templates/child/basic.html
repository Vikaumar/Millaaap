{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Milaap - Connecting lost children with their families using AI and Face Recognition technology.">
    <meta name="author" content="Milaap Project">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for beautiful icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Design System CSS -->
    <link rel="stylesheet" href="{% static 'child/css/style.css' %}">

    <title>{% block title %}Milaap - Face Recognition Child Finder{% endblock %}</title>
    
    <style type="text/css">
      {% block style %}{% endblock %}
    </style>
  </head>
  <body>
    <!-- Unified Dynamic Glassmorphism Navbar -->
    {% include 'child/navbar.html' %}

    <main class="py-4">
      {% block body %} {% endblock %}
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
