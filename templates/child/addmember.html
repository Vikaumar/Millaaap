{% extends 'child/basic.html' %}

{% block title %}Add Member - Milaap{% endblock %}

{% block body %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="glass-card">
        <div class="text-center mb-4">
          <div class="glow-text-primary fs-1 mb-2"><i class="fas fa-child"></i></div>
          <h2 class="gradient-text font-weight-bold">Register New Child</h2>
          <p class="text-muted">Enter details of the child to add them to the face training database</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="needs-validation">
          {% csrf_token %}
          {{ form.as_p }}
          
          <div class="text-center mt-4">
            <button type="submit" class="btn btn-grad-primary py-2 px-5">
              <i class="fas fa-save me-2"></i>Save and Continue
            </button>
            <a href="/child/dashboard/" class="btn btn-glass py-2 px-4 ms-2">
              <i class="fas fa-times me-2"></i>Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
